        function initBoard() {
            board.width = Math.min(500, canvasElement.width * 0.7);
            board.x = (canvasElement.width - board.width) / 2;
            board.y = canvasElement.height - 140;

        function spawnNails() {
            nails = [];
            const count = Math.floor(board.width / 70);
            const spacing = board.width / (count + 1);
            for (let i = 0; i < count; i++) {
                nails.push({
                    x: board.x + spacing * (i + 1),
                    y: board.y - NAIL_HEIGHT + 10,
                    width: NAIL_WIDTH,
                    height: NAIL_HEIGHT,
                    headSize: NAIL_HEAD_SIZE,
                    hits: 0,
                    maxHits: NAIL_MAX_HITS,
                    sunk: 0,
                    wobble: 0,
                    active: true
                });
            }
            boardNailCount = count;
        }

        function checkHammerHit() {
            if (!holdingTool || holdingTool.key !== 'martelo' || hammerSwing <= 0.3) return;
            const hammerX = holdingTool.x;
            const hammerY = holdingTool.y + 40; // ponta do martelo

            for (let nail of nails) {
                if (!nail.active) continue;
                const dx = Math.abs(hammerX - nail.x);
                const dy = Math.abs(hammerY - (nail.y + nail.sunk));
                if (dx < 30 && dy < 50) {
                    nail.hits++;
                    nail.sunk += NAIL_HAMMER_DEPTH;
                    nail.wobble = 5;
                    // Som de martelar no prego
                    playSound('nail');
                    // Efeitos de partículas de madeira
                    for (let p = 0; p < 6; p++) {
                        toolEffects.push({
                            type: 'woodchip',
                            x: nail.x + (Math.random() - 0.5) * 10,
                            y: board.y + Math.random() * 5,
                            vx: (Math.random() - 0.5) * 8,
                            vy: -Math.random() * 6 - 2,
                            life: 1, maxLife: 1,
                            size: 3 + Math.random() * 3,
                            color: '#DEB887'
                        });
                    }
                    // Faíscas metálicas
                    for (let p = 0; p < 4; p++) {
                        toolEffects.push({
                            type: 'spark',
                            x: nail.x,
                            y: nail.y + nail.sunk,
                            vx: (Math.random() - 0.5) * 6,
                            vy: -Math.random() * 4 - 1,
                            life: 1, maxLife: 1,
                            size: 2 + Math.random() * 2,
                            color: '#FFD700'
                        });
                    }
                    if (nail.hits >= nail.maxHits) {
                        nail.active = false;
                        boardNailCount--;
                        // Efeito de prego pregado
                        for (let p = 0; p < 10; p++) {
                            toolEffects.push({
                                type: 'spark',
                                x: nail.x,
                                y: board.y,
                                vx: (Math.random() - 0.5) * 10,
                                vy: -Math.random() * 8,
                                life: 1, maxLife: 1,
                                size: 3 + Math.random() * 3,
                                color: '#FF6B35'
                            });
                        }
                        // Se todos pregados, respawn após 1.5s
                        if (boardNailCount <= 0) {
                            setTimeout(spawnNails, 1500);
                        }
                    }
                    break; // só acerta um de cada vez
                }
            }
        }

        async function initTeachableMachine() {
            try {
                const modelURL = MODEL_BASE_PATH + 'model.json';
                const metadataURL = MODEL_BASE_PATH + 'metadata.json';
                const behavioursURL = MODEL_BASE_PATH + 'behaviours.json';

                console.log('A carregar modelo de:', modelURL);

                // Check if files exist first
                const modelCheck = await fetch(modelURL, { method: 'HEAD' });
                if (!modelCheck.ok) {
                    throw new Error(`model.json não encontrado em ${modelURL} (status ${modelCheck.status}). Verifica o caminho MODEL_BASE_PATH.`);
                }

                // Load model using Teachable Machine image library
                // This handles the TM-specific model format correctly
                if (typeof tmImage !== 'undefined') {
                    tmModel = await tmImage.load(modelURL, metadataURL);
                    tmMaxPredictions = tmModel.getTotalClasses();
                    tmLabels = [];
                    for (let i = 0; i < tmMaxPredictions; i++) {
                        tmLabels.push(tmModel.getClassLabels()[i]);
                    }
                    console.log('✅ Teachable Machine carregado via tmImage! Labels:', tmLabels);
                } else {
                    // Fallback: try manual loading
                    console.log('tmImage não disponível, a tentar carregamento manual...');
                    tmModel = await tf.loadLayersModel(modelURL);

                    // Load metadata for labels
                    const metaRes = await fetch(metadataURL);
                    if (metaRes.ok) {
                        const metadata = await metaRes.json();
                        tmLabels = metadata.labels || [];
                        tmMaxPredictions = tmLabels.length;
                    }
                }

                // Load behaviours (optional)
                try {
                    const behavRes = await fetch(behavioursURL);
                    if (behavRes.ok) {
                        const behavData = await behavRes.json();
                        tmBehaviours = behavData.behaviours || [];
                    }
                } catch (be) {
                    console.log('behaviours.json não encontrado, usando labels como textos');
                    tmBehaviours = tmLabels.map(l => ({ label: l, text: { text: l } }));
                }

                tmRunning = true;
                console.log('✅ Modelo pronto! Labels:', tmLabels);
                updateStatus('Modelo IA carregado: ' + tmLabels.join(', '));
            } catch (e) {
                console.warn('❌ Teachable Machine não carregado:', e.message);
                console.warn('DICA: Verifica se model.json, metadata.json e weights.bin estão em:', MODEL_BASE_PATH);
                console.warn('Erro completo:', e);
                tmRunning = false;
                updateStatus('Modelo IA não carregado. Verifica consola (F12)');
            }
        }

        // === GOOGLE SHEETS INTEGRATION ===
        async function loadSampleImages() {
            if (!tmRunning || tmLabels.length === 0) {
                console.log('ℹ️ Samples: Modelo não carregado, a aguardar...');
                setTimeout(loadSampleImages, 3000);
                return;
            }

            // Mapeia índice da classe para ficheiro na pasta samples/
            // Os ficheiros do Teachable Machine seguem o padrão: {classe}_{numero}.png
            // Usamos o primeiro de cada classe como referência: 0_0.png, 1_0.png, etc.
            const classToFile = {};
            tmLabels.forEach((label, idx) => {
                classToFile[label] = `${idx}_0.png`;
            });

            console.log('📁 A carregar samples para:', tmLabels);
            console.log('   Ficheiros esperados:', Object.values(classToFile));

            for (const label of tmLabels) {
                const filename = classToFile[label];
                try {
                    const img = new Image();
                    img.src = `${SAMPLES_FOLDER}${filename}`;
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                    });
                    sampleImages[label] = img;
                    console.log(`✅ Sample carregado: ${filename} (${label})`);
                } catch (e) {
                    console.warn(`❌ Sample não encontrado: ${filename} (${label})`);
                    // Tenta com extensões alternativas
                    const extensions = ['jpg', 'jpeg', 'webp'];
                    for (const ext of extensions) {
                        try {
                            const altFile = `${filename.split('.')[0]}.${ext}`;
                            const img = new Image();
                            img.src = `${SAMPLES_FOLDER}${altFile}`;
                            await new Promise((resolve, reject) => {
                                img.onload = resolve;
                                img.onerror = reject;
                            });
                            sampleImages[label] = img;
                            console.log(`✅ Sample carregado (alt): ${altFile} (${label})`);
                            break;
                        } catch (e2) {
                            // continua para próxima extensão
                        }
                    }
                }
            }

            console.log(`📸 Total samples carregados: ${Object.keys(sampleImages).length}/${tmLabels.length}`);
        }

        function parseSheetData(rows) {
            const headers = rows[0];
            const result = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 6) continue;
                result.push({
                    colaborador: row[0] || '',
                    setor: row[1] || '',
                    totalAnual: parseInt(row[2]) || 0,
                    diasExtra: parseInt(row[3]) || 0,
                    diasUsados: parseInt(row[4]) || 0,
                    diasDisponiveis: parseInt(row[5]) || 0,
                    diasAposFecho: parseInt(row[6]) || 0
                });
            }
            return result;
        }

        async function predictEquipment() {
            if (!tmModel || !tmRunning || !videoElement || videoElement.readyState < 2) return;
            const now = Date.now();
            if (now - tmLastPredictionTime < tmPredictionInterval) return;
            tmLastPredictionTime = now;

            try {
                let predictions;

                if (typeof tmImage !== 'undefined' && tmModel.predict) {
                    // Use Teachable Machine predict method
                    predictions = await tmModel.predict(videoElement);
                } else {
                    // Fallback: manual tensor creation
                    const tensor = tf.browser.fromPixels(videoElement)
                        .resizeNearestNeighbor([224, 224])
                        .toFloat()
                        .div(255.0)
                        .expandDims(0);
                    const predData = await tmModel.predict(tensor).data();
                    tensor.dispose();
                    predictions = Array.from(predData).map((p, i) => ({
                        className: tmLabels[i] || `Class ${i}`,
                        probability: p
                    }));
                }

                // Find highest confidence
                let maxIdx = 0, maxVal = 0;
                if (Array.isArray(predictions)) {
                    for (let i = 0; i < predictions.length; i++) {
                        const prob = predictions[i].probability || predictions[i];
                        if (prob > maxVal) { maxVal = prob; maxIdx = i; }
                    }
                }

                const threshold = 0.65;
                if (maxVal > threshold) {
                    const label = tmLabels[maxIdx] || (predictions[maxIdx] && predictions[maxIdx].className) || 'Desconhecido';
                    const behaviour = tmBehaviours.find(b => b.label === label);
                    const text = behaviour ? behaviour.text.text : label;

                    if (tmPrediction !== text) {
                        tmPrediction = text;
                        tmConfidence = maxVal;
                        tmPanelTarget = 1;
                        setTimeout(() => {
                            if (tmPrediction === text) tmPanelTarget = 0;
                        }, 4000);
                    } else {
                        tmConfidence = maxVal * 0.7 + tmConfidence * 0.3;
                    }
                } else {
                    tmPanelTarget = 0;
                }
            } catch (e) {
                console.warn('Prediction error:', e);
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();

            canvasCtx.fillStyle = 'rgba(255,255,255,0.4)'; canvasCtx.font = '12px Segoe UI'; canvasCtx.textAlign = 'center'; canvasCtx.fillText('Aponte e faça pinça para pegar', x + w/2, y + h - 10);
        }

        function drawHeldTool() {
            drawLanternLight(); drawLevel();
            const tool = holdingTool; const x = tool.x, y = tool.y, scale = tool.scale, rotation = tool.rotation * (Math.PI / 180); let extraRotation = 0;
            if (tool.key === 'martelo' && hammerSwing > 0) extraRotation = Math.sin(hammerSwing * Math.PI) * 60 * (Math.PI / 180);
            canvasCtx.save(); canvasCtx.translate(x, y); canvasCtx.rotate(rotation + extraRotation); canvasCtx.scale(scale, scale);
            canvasCtx.beginPath(); canvasCtx.arc(0, 0, 35, 0, Math.PI * 2); canvasCtx.fillStyle = hexToRgba(tool.color, 0.15); canvasCtx.fill();
            canvasCtx.beginPath(); canvasCtx.arc(0, 0, 28, 0, Math.PI * 2); canvasCtx.fillStyle = 'rgba(20, 25, 35, 0.9)'; canvasCtx.fill(); canvasCtx.strokeStyle = tool.color; canvasCtx.lineWidth = 2; canvasCtx.stroke();
            canvasCtx.font = '32px Segoe UI'; canvasCtx.textAlign = 'center'; canvasCtx.textBaseline = 'middle'; canvasCtx.fillText(tool.icon, 0, 0);
            canvasCtx.restore();
            canvasCtx.fillStyle = 'rgba(0,0,0,0.7)'; roundRect(x - 70, y - 55, 140, 22, 6, null, true); canvasCtx.fillStyle = tool.color; canvasCtx.font = 'bold 12px Segoe UI'; canvasCtx.textAlign = 'center'; canvasCtx.fillText(tool.name, x, y - 40); canvasCtx.fillStyle = 'rgba(255,255,255,0.5)'; canvasCtx.font = '11px Segoe UI'; canvasCtx.fillText(tool.desc, x, y + 45);
        }

        function drawPanel() {
            if (!activePanel) return; const progress = panelAnimProgress; if (progress <= 0.01) return;
            const w = PANEL_WIDTH * easeOutBack(progress); const h = PANEL_HEIGHT * easeOutBack(progress); const x = activePanel.x + (PANEL_WIDTH - w) / 2; const y = activePanel.y + (PANEL_HEIGHT - h) / 2; const color = activePanel.color;
            canvasCtx.fillStyle = `rgba(0,0,0,${0.5 * progress})`; canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.shadowColor = 'rgba(0,0,0,0.6)'; canvasCtx.shadowBlur = 30 * progress; canvasCtx.shadowOffsetY = 15 * progress; roundRect(x, y, w, h, 16, 'rgba(18, 22, 32, 0.95)'); canvasCtx.shadowColor = 'transparent'; canvasCtx.shadowBlur = 0;
            canvasCtx.fillStyle = color; roundRect(x, y, w, 4, [16, 16, 0, 0], null, true); canvasCtx.fillStyle = `rgba(255,255,255,${progress})`; canvasCtx.font = `bold ${16 * progress}px Segoe UI, sans-serif`; canvasCtx.textAlign = 'left'; canvasCtx.fillText(activePanel.title, x + 18, y + 32);
            if (progress > 0.5) { drawCloseButton(x + w - 44, y + 6, isOverPanelX(pointerX, pointerY)); }
            if (progress > 0.6) { const contentOpacity = Math.min((progress - 0.6) / 0.4, 1); canvasCtx.globalAlpha = contentOpacity; drawPanelContent(x, y + HEADER_HEIGHT + 10, w, h - HEADER_HEIGHT - 20, activePanel); canvasCtx.globalAlpha = 1; }
        }

        function drawPanelContent(px, py, pw, ph, panel) { const type = panel.type; const data = panel.data; const color = panel.color; if (type === 'bars') drawBarChart(px, py, pw, ph, data, color); else if (type === 'gauge') drawGaugeChart(px, py, pw, ph, data, color); else if (type === 'list') drawListView(px, py, pw, ph, data, color); }

        function drawBarChart(px, py, pw, ph, data, color) {
            const items = data.items; const maxVal = Math.max(...items.map(i => i.value || i.mtbf || 0)); const barW = (pw - 60) / items.length - 8; const chartH = ph - 80; const baseY = py + chartH + 30;
            canvasCtx.strokeStyle = 'rgba(255,255,255,0.15)'; canvasCtx.lineWidth = 1; canvasCtx.beginPath(); canvasCtx.moveTo(px + 40, py + 20); canvasCtx.lineTo(px + 40, baseY); canvasCtx.lineTo(px + pw - 20, baseY); canvasCtx.stroke();
            for (let i = 0; i <= 4; i++) { const gy = py + 20 + (chartH * i / 4); canvasCtx.strokeStyle = 'rgba(255,255,255,0.05)'; canvasCtx.beginPath(); canvasCtx.moveTo(px + 40, gy); canvasCtx.lineTo(px + pw - 20, gy); canvasCtx.stroke(); canvasCtx.fillStyle = 'rgba(255,255,255,0.4)'; canvasCtx.font = '10px Segoe UI'; canvasCtx.textAlign = 'right'; canvasCtx.fillText(Math.round(maxVal * (1 - i/4)).toString(), px + 35, gy + 3); }
            items.forEach((item, i) => { const val = item.value || item.mtbf || 0; const barH = (val / maxVal) * chartH; const bx = px + 50 + i * (barW + 12); const by = baseY - barH; const grad = canvasCtx.createLinearGradient(bx, by, bx, baseY); grad.addColorStop(0, color); grad.addColorStop(1, hexToRgba(color, 0.3)); canvasCtx.fillStyle = grad; roundRect(bx, by, barW, barH, [4, 4, 0, 0], null, true); canvasCtx.fillStyle = '#fff'; canvasCtx.font = 'bold 10px Segoe UI'; canvasCtx.textAlign = 'center'; canvasCtx.fillText(val.toString(), bx + barW/2, by - 6); canvasCtx.fillStyle = 'rgba(255,255,255,0.6)'; canvasCtx.font = '9px Segoe UI'; canvasCtx.fillText(item.label, bx + barW/2, baseY + 14); });
            if (data.title === 'MTBF / MTTR') { canvasCtx.fillStyle = 'rgba(255,255,255,0.5)'; canvasCtx.font = '11px Segoe UI'; canvasCtx.textAlign = 'left'; canvasCtx.fillText('Valores em horas (MTBF)', px + 50, py + chartH + 55); }
        }

        function drawGaugeChart(px, py, pw, ph, data, color) {
            const items = data.items; const cols = 2; const rows = Math.ceil(items.length / cols); const cellW = (pw - 40) / cols; const cellH = (ph - 40) / rows;
            items.forEach((item, i) => { const cx = px + 20 + (i % cols) * cellW + cellW/2; const cy = py + 20 + Math.floor(i / cols) * cellH + cellH/2; const radius = Math.min(cellW, cellH) * 0.35; const value = item.value; const angle = (value / 100) * Math.PI - Math.PI; canvasCtx.strokeStyle = 'rgba(255,255,255,0.1)'; canvasCtx.lineWidth = 10; canvasCtx.beginPath(); canvasCtx.arc(cx, cy, radius, Math.PI, 0); canvasCtx.stroke(); const grad = canvasCtx.createLinearGradient(cx - radius, cy, cx + radius, cy); grad.addColorStop(0, '#ff5252'); grad.addColorStop(0.5, '#ff9100'); grad.addColorStop(1, color); canvasCtx.strokeStyle = grad; canvasCtx.lineWidth = 10; canvasCtx.lineCap = 'round'; canvasCtx.beginPath(); canvasCtx.arc(cx, cy, radius, Math.PI, angle); canvasCtx.stroke(); canvasCtx.lineCap = 'butt'; canvasCtx.fillStyle = '#fff'; canvasCtx.font = `bold ${Math.floor(radius * 0.5)}px Segoe UI`; canvasCtx.textAlign = 'center'; canvasCtx.fillText(value.toFixed(1) + '%', cx, cy + 5); canvasCtx.fillStyle = 'rgba(255,255,255,0.6)'; canvasCtx.font = '11px Segoe UI'; canvasCtx.fillText(item.label, cx, cy + radius + 18); });
        }

        function drawListView(px, py, pw, ph, data, color) {
            const items = data.items; const rowH = 38; const startY = py + 10;
            canvasCtx.fillStyle = 'rgba(255,255,255,0.08)'; roundRect(px + 10, startY, pw - 20, rowH, [8, 8, 0, 0], null, true); canvasCtx.fillStyle = 'rgba(255,255,255,0.5)'; canvasCtx.font = 'bold 11px Segoe UI'; canvasCtx.textAlign = 'left';
            if (data.title === 'Lista de Ativos') { canvasCtx.fillText('Ativo', px + 20, startY + 24); canvasCtx.fillText('Estado', px + pw - 140, startY + 24); canvasCtx.fillText('Última', px + pw - 60, startY + 24); }
            else if (data.title === 'Tarefas Pendentes') { canvasCtx.fillText('Tarefa', px + 20, startY + 24); canvasCtx.fillText('Prioridade', px + pw - 140, startY + 24); canvasCtx.fillText('Prazo', px + pw - 60, startY + 24); }
            else { canvasCtx.fillText('Descrição', px + 20, startY + 24); canvasCtx.fillText('Data', px + pw - 140, startY + 24); canvasCtx.fillText('Tipo', px + pw - 60, startY + 24); }
            items.forEach((item, i) => { const ry = startY + rowH + i * rowH; if (ry + rowH > py + ph) return; if (i % 2 === 0) { canvasCtx.fillStyle = 'rgba(255,255,255,0.03)'; canvasCtx.fillRect(px + 10, ry, pw - 20, rowH); } canvasCtx.fillStyle = '#e0e0e0'; canvasCtx.font = '12px Segoe UI'; canvasCtx.textAlign = 'left'; canvasCtx.fillText(item.label, px + 20, ry + 24); let statusColor = color; let statusText = item.status || item.prio || item.date || item.type || ''; if (item.status === 'OK') statusColor = '#00c853'; else if (item.status === 'Alerta') statusColor = '#ff9100'; else if (item.status === 'Crítico') statusColor = '#ff1744'; else if (item.prio === 'Alta') statusColor = '#ff9100'; else if (item.prio === 'Crítica') statusColor = '#ff1744'; else if (item.prio === 'Baixa') statusColor = '#00c853'; else if (item.type === 'Preventiva') statusColor = '#00c853'; else if (item.type === 'Corretiva') statusColor = '#ff9100'; canvasCtx.fillStyle = statusColor; canvasCtx.font = 'bold 11px Segoe UI'; canvasCtx.textAlign = 'center'; canvasCtx.fillText(statusText, px + pw - 100, ry + 24); canvasCtx.fillStyle = 'rgba(255,255,255,0.5)'; canvasCtx.font = '11px Segoe UI'; canvasCtx.textAlign = 'right'; canvasCtx.fillText(item.last || item.due || '', px + pw - 20, ry + 24); });
        }

        function easeOutBack(t) { const c1 = 1.70158; const c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }

        function drawPointer(x, y, pinching) {
            const color = pinching ? '#00ff88' : '#00e5ff'; const r = pinching ? 14 : 9; const pulse = Math.sin(Date.now() / 200) * 3;
            canvasCtx.beginPath(); canvasCtx.arc(x, y, r + 12 + pulse, 0, Math.PI * 2); canvasCtx.fillStyle = pinching ? 'rgba(0,255,136,0.12)' : 'rgba(0,200,255,0.12)'; canvasCtx.fill();
            canvasCtx.beginPath(); canvasCtx.arc(x, y, r, 0, Math.PI * 2); canvasCtx.fillStyle = color; canvasCtx.fill(); canvasCtx.strokeStyle = '#fff'; canvasCtx.lineWidth = 2.5; canvasCtx.stroke();
            canvasCtx.strokeStyle = color; canvasCtx.lineWidth = 1.5; canvasCtx.beginPath(); canvasCtx.moveTo(x - r - 8, y); canvasCtx.lineTo(x - r - 3, y); canvasCtx.moveTo(x + r + 3, y); canvasCtx.lineTo(x + r + 8, y); canvasCtx.moveTo(x, y - r - 8); canvasCtx.lineTo(x, y - r - 3); canvasCtx.moveTo(x, y + r + 3); canvasCtx.lineTo(x, y + r + 8); canvasCtx.stroke();
        }

        function drawCloseButton(x, y, hovered) { const s = 30; canvasCtx.fillStyle = hovered ? 'rgba(255,70,70,0.95)' : 'rgba(255,255,255,0.12)'; canvasCtx.beginPath(); canvasCtx.arc(x + s/2, y + s/2, s/2, 0, Math.PI * 2); canvasCtx.fill(); canvasCtx.strokeStyle = '#fff'; canvasCtx.lineWidth = 2; canvasCtx.beginPath(); canvasCtx.moveTo(x + 9, y + 9); canvasCtx.lineTo(x + s - 9, y + s - 9); canvasCtx.moveTo(x + s - 9, y + 9); canvasCtx.lineTo(x + 9, y + s - 9); canvasCtx.stroke(); }

        function roundRect(x, y, w, h, r, fill, strokeOnly) { if (typeof r === 'number') r = [r, r, r, r]; canvasCtx.beginPath(); canvasCtx.moveTo(x + r[0], y); canvasCtx.lineTo(x + w - r[1], y); canvasCtx.quadraticCurveTo(x + w, y, x + w, y + r[1]); canvasCtx.lineTo(x + w, y + h - r[2]); canvasCtx.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h); canvasCtx.lineTo(x + r[3], y + h); canvasCtx.quadraticCurveTo(x, y + h, x, y + h - r[3]); canvasCtx.lineTo(x, y + r[0]); canvasCtx.quadraticCurveTo(x, y, x + r[0], y); canvasCtx.closePath(); if (fill) { canvasCtx.fillStyle = fill; canvasCtx.fill(); } if (strokeOnly) canvasCtx.fill(); }

        function hexToRgba(hex, alpha) { const r = parseInt(hex.slice(1, 3), 16); const g = parseInt(hex.slice(3, 5), 16); const b = parseInt(hex.slice(5, 7), 16); return `rgba(${r}, ${g}, ${b}, ${alpha})`; }

        function updateStatus(text) { document.getElementById('status').textContent = text; }
    </script>
